<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question Details - Decision Support</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <nav>
        <div class="nav-brand">Decision Support</div>
        <div>
            <a href="home.html">Home</a>
            <a href="ask.html">Ask Question</a>
            <a href="profile.html">Profile</a>
            <a href="#" onclick="logout()" class="text-danger">Logout</a>
        </div>
    </nav>

    <div class="container">
        <div class="question-header">
            <h2 id="q-title" class="mb-sm">Loading...</h2>
            <div id="q-meta" class="text-muted text-sm mb-md"></div>
            <p id="q-desc" class="text-lg"></p>
        </div>

        <hr class="divider">

        <h3>Vote & Comment</h3>
        <div id="vote-section" class="mb-lg"></div>

        <div id="comment-section">
            <textarea id="comment-text" placeholder="Add a comment (optional)" rows="3"></textarea>
        </div>

        <button onclick="submitVote()" class="mt-sm">Submit Response</button>

        <hr class="divider">

        <h3>Responses</h3>
        <div id="responses-list">
            <p class="text-muted">No responses yet.</p>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        const qId = new URLSearchParams(window.location.search).get('id');
        if (qId) {
            loadQuestionDetails(qId);
        } else {
            document.body.innerHTML = '<div class="container"><h3>Invalid Question ID</h3><a href="home.html">Go Back</a></div>';
        }
    </script>
</body>

</html>
