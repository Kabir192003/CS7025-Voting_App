<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Feed - Decision Support</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <nav>
        <div class="nav-brand">Decision Support</div>
        <div>
            <a href="home.html" class="active-link">Home</a>
            <a href="ask.html">Ask Question</a>
            <a href="profile.html">Profile</a>
            <a href="#" onclick="logout()" class="text-danger">Logout</a>
        </div>
    </nav>

    <div class="container">
        <div class="flex-between center mb-lg">
            <h2>Your Feed</h2>
            <button class="secondary text-sm" onclick="showPrefs()">Manage Preferences</button>
        </div>

        <div class="tabs">
            <button class="active" onclick="loadFeed('personalised', this)">For You</button>
            <button onclick="loadFeed('trending', this)">Trending</button>
            <button onclick="loadFeed('unanswered', this)">Unanswered</button>
        </div>

        <div id="feed-content">
            <div class="text-center text-muted p-xl">Loading feed...</div>
        </div>
    </div>

    <dialog id="prefs-modal">
        <div class="modal-content">
            <h3>Personalise Your Feed</h3>
            <p class="text-muted">Select the topics you are interested in.</p>
            <div id="pref-chips" class="chip-container"></div>
        </div>
        <div class="modal-footer">
            <button class="secondary" onclick="document.getElementById('prefs-modal').close()">Cancel</button>
            <button onclick="savePrefs()">Save Preferences</button>
        </div>
    </dialog>

    <script src="app.js"></script>
    <script>
        window.onload = async () => {
            const hasPrefs = await checkUserPreferences();
            if (!hasPrefs) showPrefs();
            loadFeed('personalised', document.querySelector('.tabs button'));
        };
    </script>
</body>

</html>
