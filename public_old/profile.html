<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Decision Support</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <nav>
        <div class="nav-brand">Decision Support</div>
        <div>
            <a href="home.html">Home</a>
            <a href="ask.html">Ask Question</a>
            <a href="profile.html" class="active-link">Profile</a>
            <a href="#" onclick="logout()" class="text-danger">Logout</a>
        </div>
    </nav>

    <div class="container">
        <div class="card p-xl border mb-xl">
            <h1 id="profile-name" class="mb-xs">Loading...</h1>
            <p id="profile-meta" class="text-muted">Member since...</p>
        </div>

        <h3>My Questions</h3>
        <div id="my-questions-list">
            <p class="text-muted">Loading your history...</p>
        </div>

        <h3>My Answers</h3>
        <div id="my-answers-list">
            <p class="text-muted">Loading your answers...</p>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        loadProfile();
        loadUserQuestions();
        loadUserAnswers();
    </script>
