<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Decision Support</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <nav>
        <div style="font-weight: 700; font-size: 1.2rem;">Decision Support</div>
        <div>
            <a href="home.html">Home</a>
            <a href="ask.html">Ask Question</a>
            <a href="profile.html" style="color: var(--primary);">Profile</a>
            <a href="#" onclick="logout()" style="color: var(--danger);">Logout</a>
        </div>
    </nav>

    <div class="container">
        <div
            style="background: var(--bg-card); padding: var(--space-xl); border-radius: var(--radius-lg); border: 1px solid var(--border-color); margin-bottom: var(--space-xl);">
            <h1 id="profile-name" style="margin-bottom: 5px;">Loading...</h1>
            <p id="profile-meta" style="color: var(--text-muted);">Member since...</p>
        </div>

        <h3>My Questions</h3>
        <div id="my-questions-list">
            <p style="color: var(--text-muted);">Loading your history...</p>
        </div>

        <h3>My Answers</h3>
        <div id="my-answers-list">
            <p style="color: var(--text-muted);">Loading your answers...</p>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        loadProfile();
        loadUserQuestions();
        loadUserAnswers();
    </script>
</body>

</html>
