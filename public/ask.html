<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask a Question - Decision Support</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <nav>
        <div style="font-weight: 700; font-size: 1.2rem;">Decision Support</div>
        <div>
            <a href="home.html">Home</a>
            <a href="ask.html" style="color: var(--primary);">Ask Question</a>
            <a href="profile.html">Profile</a>
            <a href="#" onclick="logout()" style="color: var(--danger);">Logout</a>
        </div>
    </nav>

    <div class="container">
        <h2>Ask Something</h2>
        <div
            style="background: var(--bg-card); padding: var(--space-xl); border-radius: var(--radius-lg); border: 1px solid var(--border-color);">

            <label for="q-title" style="display: block; font-weight: 600; margin-bottom: 5px;">Question Title</label>
            <input type="text" id="q-title" placeholder="e.g. Which laptop should I buy for coding?">

            <label for="q-desc" style="display: block; font-weight: 600; margin-bottom: 5px;">Description</label>
            <textarea id="q-desc" rows="4" placeholder="Provide more context..."></textarea>

            <label for="q-cat" style="display: block; font-weight: 600; margin-bottom: 5px;">Category</label>
            <select id="q-cat">
                <!-- populated by js -->
            </select>

            <div style="margin-top: var(--space-md); display: flex; gap: var(--space-lg);">
                <label style="display: flex; align-items: center; cursor: pointer;">
                    <input type="checkbox" id="q-anon" style="width: auto; margin: 0 10px 0 0;">
                    Post Anonymously
                </label>
                <label style="display: flex; align-items: center; cursor: pointer;">
                    <input type="checkbox" id="q-comments" checked style="width: auto; margin: 0 10px 0 0;">
                    Allow Comments
                </label>
            </div>

            <h3 style="margin-top: var(--space-lg);">Voting Options</h3>
            <div id="options-list">
                <input type="text" class="opt-input" placeholder="Option 1">
                <input type="text" class="opt-input" placeholder="Option 2">
            </div>
            <button class="secondary" onclick="addOption()" style="margin-top: 5px; font-size: 0.9rem;">+ Add Another
                Option</button>

            <div style="margin-top: var(--space-xl); text-align: right;">
                <button onclick="postQuestion()">Post Question</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>loadCategoriesForSelect();</script>
</body>

</html>
