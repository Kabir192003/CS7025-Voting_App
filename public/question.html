<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question Details - Decision Support</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <nav>
        <div style="font-weight: 700; font-size: 1.2rem;">Decision Support</div>
        <div>
            <a href="home.html">Home</a>
            <a href="ask.html">Ask Question</a>
            <a href="profile.html">Profile</a>
            <a href="#" onclick="logout()" style="color: var(--danger);">Logout</a>
        </div>
    </nav>

    <div class="container">
        <div class="question-card" style="border: none; box-shadow: none; padding: 0;">
            <h2 id="q-title" style="margin-bottom: 0.5rem;">Loading...</h2>
            <div id="q-meta" style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1rem;"></div>
            <p id="q-desc" style="font-size: 1.1rem; line-height: 1.6;"></p>
        </div>

        <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 2rem 0;">

        <h3>Vote & Comment</h3>
        <div id="vote-section" style="margin-bottom: 1.5rem;">
            <!-- Options injected here -->
        </div>

        <div id="comment-section">
            <textarea id="comment-text" placeholder="Add a comment (optional)" rows="3"></textarea>
        </div>
        <button onclick="submitVote()" style="margin-top: 10px;">Submit Response</button>

        <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 2rem 0;">

        <h3>Responses</h3>
        <div id="responses-list">
            <p style="color: var(--text-muted);">No responses yet.</p>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const qId = urlParams.get('id');
        if (qId) {
            loadQuestionDetails(qId);
        } else {
            document.body.innerHTML = '<div class="container"><h3>Invalid Question ID</h3><a href="home.html">Go Back</a></div>';
        }
    </script>
</body>

</html>
